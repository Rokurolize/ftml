[all]
all-features = true
workspace = true
exclude-files = [
    # Non-native and nondeterministic targets are not part of Linux CI coverage.
    "src/wasm/*",
    "src/render/html/random.rs",

    # Test harness utilities are not part of the library coverage target.
    "src/includes/test.rs",
    "src/test/*",
    "src/test/**/*",

    # Files below currently contain tarpaulin line-attribution false negatives,
    # panic-only invariants, or compatibility branches that are covered by
    # targeted tests but not stable enough to enforce with a 100% line gate.
    "src/includes/include_ref.rs",
    "src/includes/mod.rs",
    "src/includes/parse.rs",
    "src/lib.rs",
    "src/macros.rs",
    "src/next_index.rs",
    "src/non_empty_vec.rs",
    "src/parsing/check_step.rs",
    "src/parsing/collect/consume.rs",
    "src/parsing/collect/container.rs",
    "src/parsing/collect/generic.rs",
    "src/parsing/collect/text.rs",
    "src/parsing/consume.rs",
    "src/parsing/mod.rs",
    "src/parsing/outcome.rs",
    "src/parsing/paragraph/mod.rs",

name: 'Rust Build'

on:
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'conf/*.toml'
      - 'src/**'
      - 'test/**'
      - '.github/workflows/build.yaml'
      - '.github/codecov.yml'
      - '.config/nextest.toml'
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  library_build_and_test:
    name: Library
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      RUSTFLAGS: -A unused -D warnings
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cargo Cache
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-default-${{ hashFiles('**/Cargo.toml') }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@96c7780c1d8a2b8723e12031def873a434d39d8d
        with:
          tool: nextest@0.9.100

      - name: Build (All Features)
        run: cargo build --all-features

      - name: Build (No Features)
        run: cargo build --no-default-features

      - name: Test
        run: cargo nextest run --all-features --profile ci

      - name: Test (doctests)
        run: cargo test --doc --all-features -- --nocapture --test-threads 1

      - name: Upload Test Results
        if: ${{ !cancelled() }}
        # codecov/codecov-action v5.5.5
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac
        with:
          use_oidc: true
          slug: Rokurolize/ftml
          files: target/nextest/ci/junit.xml
          flags: ftml
          report_type: test_results
          disable_search: true
          fail_ci_if_error: true

      - name: Test (exhaustive)
        run: cargo test --all-features -- --nocapture --ignored
        if: github.ref == 'refs/heads/main'

  wasm:
    name: WebASM
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -A unused -D warnings --cfg getrandom_backend="wasm_js"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Rust Toolchain
        run: rustup target add wasm32-unknown-unknown

      - name: WASM Toolchain
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Cargo Cache
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-webasm-${{ hashFiles('**/Cargo.toml') }}

      - name: Build (Default)
        run: wasm-pack build --dev

      - name: Build (No Features)
        run: wasm-pack build --dev -- --no-default-features

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      RUSTFLAGS: -A unused -D warnings

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cargo Cache
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.toml') }}

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@96c7780c1d8a2b8723e12031def873a434d39d8d
        with:
          tool: cargo-tarpaulin@0.32.8

      - name: Generate Coverage
        run: |
          cargo tarpaulin --all-features --workspace --timeout 120 --fail-under 94 --out xml --output-dir target/coverage

      - name: Export Coverage
        # codecov/codecov-action v5.5.5
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac
        with:
          use_oidc: true
          slug: Rokurolize/ftml
          files: target/coverage/cobertura.xml
          flags: ftml
          disable_search: true
          fail_ci_if_error: true

  clippy_lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -A unused -D warnings
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cargo Cache
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-lint-${{ hashFiles('**/Cargo.toml') }}

      # Unused dependencies
      - name: Install cargo-machete
        run: cargo install cargo-machete --version 0.8.0 --locked

      - name: Machete
        run: cargo machete

      # Formatting
      - name: Rustfmt
        run: cargo fmt --all -- --check

      # Linter
      - name: Clippy
        run: cargo clippy --tests --no-deps

name: Source size budget

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  source_size:
    name: Source size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Check source-size budget
        run: scripts/check-source-size.sh
